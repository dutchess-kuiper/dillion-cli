name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - name: Ad-hoc sign macOS binaries
        run: |
          cat > entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-executable-page-protection</key>
            <true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --force --deep --sign - --entitlements entitlements.plist dist/dillion-darwin-arm64
          codesign --force --deep --sign - --entitlements entitlements.plist dist/dillion-darwin-x64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dillion-darwin-arm64
            dist/dillion-darwin-x64
            dist/dillion-linux-x64
            dist/dillion-linux-arm64
          generate_release_notes: true
